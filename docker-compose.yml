services:
  web:
    container_name: speedhive-tools-ui
    build: .
    restart: unless-stopped
    environment:
      - SPEEDHIVE_DATA_DIR=/app/data
      # site login password; value lives in the gitignored .env file
      - SPEEDHIVE_UI_PASSWORD=${SPEEDHIVE_UI_PASSWORD}
      # event-count cap applied to every sync (incremental and full); value lives in .env
      - SPEEDHIVE_MAX_ORG_EVENTS=${SPEEDHIVE_MAX_ORG_EVENTS}
      # Gemini API key for LLM-based track-record parsing; value lives in .env
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Gemini model; value lives in .env
      - GEMINI_MODEL=${GEMINI_MODEL}
    ports:
      - "8854:8854"
    volumes:
      - ./data:/app/data
