<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Speedhive-tools Dashboard{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            /* Minimalist flat dark palette */
            --bg-main: #0a0b10;
            --bg-surface: #12141d;
            --bg-surface-2: #1b1e2b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #222634;
            --brand: #06b6d4;
            --brand-dark: #0891b2;
            --brand-soft: rgba(6, 182, 212, 0.08);
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.08);
            --success: #10b981;
            --success-soft: rgba(16, 185, 129, 0.08);
            --warning: #f59e0b;
            --warning-soft: rgba(245, 158, 11, 0.08);
            
            --radius-lg: 4px;
            --radius-md: 4px;
            --radius-sm: 2px;
            
            --font-body: 'Inter', sans-serif;
            --transition: all 0.15s ease-in-out;
        }

        body {
            margin: 0;
            background: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .custom-navbar {
            border-bottom: 1px solid var(--border);
            background: var(--bg-surface);
            padding: 0.75rem 0;
        }

        .navbar-brand-custom {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.2rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            letter-spacing: -0.01em;
        }

        .nav-link-custom {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.4rem 0.8rem !important;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .navbar-nav .nav-link-custom.active,
        .navbar-nav .nav-link-custom:hover,
        .navbar-nav .nav-link-custom:focus {
            color: var(--text-main) !important;
            background: var(--bg-surface-2) !important;
        }

        main.container {
            max-width: 1100px;
        }

        .glass-card {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--bg-surface);
            padding: 1.25rem;
            transition: var(--transition);
        }

        .badge-custom {
            border: 0;
            border-radius: 4px;
            padding: 0.2rem 0.45rem;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 0.2rem;
        }

        .badge-race {
            background: var(--brand-soft);
            color: var(--brand);
        }

        .badge-qualifying {
            background: rgba(139, 92, 246, 0.08);
            color: #8b5cf6;
        }

        .badge-practice {
            background: var(--warning-soft);
            color: var(--warning);
        }

        .badge-neutral {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .btn-custom {
            border: 1px solid var(--brand);
            background: var(--brand);
            color: var(--bg-main);
            border-radius: var(--radius-md);
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-custom:hover, .btn-custom:focus, .btn-custom.active {
            background: var(--brand-dark);
            border-color: var(--brand-dark);
            color: var(--bg-main);
        }

        .btn-custom-outline {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            border-radius: var(--radius-md);
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            transition: var(--transition);
        }

        .btn-custom-outline:hover, .btn-custom-outline:focus, .btn-custom-outline.active {
            border-color: var(--brand);
            color: var(--brand);
            background: transparent;
        }

        .form-control-custom {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-surface-2);
            color: var(--text-main);
            font-size: 0.85rem;
            padding: 0.4rem 0.75rem;
            transition: var(--transition);
        }

        .form-control-custom::placeholder {
            color: var(--text-muted);
        }

        .form-control-custom:focus {
            border-color: var(--brand);
            background: var(--bg-surface-2);
            color: var(--text-main);
            outline: none;
            box-shadow: none;
        }

        .table-custom-container {
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--bg-surface);
            overflow: hidden;
        }

        .table-custom {
            margin: 0;
            background: transparent;
            width: 100%;
            --bs-table-bg: transparent !important;
            --bs-table-color: var(--text-main) !important;
            --bs-table-border-color: var(--border) !important;
            --bs-table-hover-bg: var(--bg-surface-2) !important;
            --bs-table-striped-bg: rgba(255, 255, 255, 0.005) !important;
        }

        .table-custom th {
            background: var(--bg-surface-2) !important;
            color: var(--text-muted) !important;
            border-bottom: 1px solid var(--border);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            padding: 0.6rem 0.85rem;
        }

        .table-custom td {
            border-bottom: 1px solid var(--border);
            color: var(--text-main) !important;
            font-size: 0.85rem;
            padding: 0.6rem 0.85rem;
            vertical-align: middle;
        }

        .table-custom tbody tr:hover td {
            background: var(--bg-surface-2) !important;
            color: var(--text-main) !important;
        }

        .meta-list {
            list-style: none;
            padding-left: 0;
            margin-bottom: 0;
        }

        .meta-list li {
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 0;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        
        .meta-list li span.val {
            color: var(--text-main);
            font-weight: 500;
        }

        .meta-list li:last-child {
            border-bottom: 0;
        }

        .notice-banner {
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-surface);
            color: var(--text-main);
            padding: 0.6rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .notice-banner.error {
            border-color: rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.05);
            color: #fca5a5;
        }

        .notice-banner.success {
            border-color: rgba(16, 185, 129, 0.2);
            background: rgba(16, 185, 129, 0.05);
            color: #a7f3d0;
        }

        .progress {
            background-color: var(--bg-surface-2);
            border-radius: var(--radius-sm);
            height: 6px;
        }

        .progress-bar {
            background: var(--brand);
            border-radius: var(--radius-sm);
        }

        .alert.alert-danger {
            border-color: rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.05);
            color: #fca5a5;
            font-size: 0.85rem;
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
        }

        .text-muted,
        .text-secondary {
            color: var(--text-muted) !important;
        }

        footer {
            margin-top: 4rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            padding: 1.5rem 0;
            font-size: 0.8rem;
        }

        .navbar-toggler i {
            color: var(--text-main);
        }

        /* Form Controls Dark mode fixes */
        .form-select, select.form-control-custom {
            background-color: var(--bg-surface-2);
            color: var(--text-main);
            border-color: var(--border);
        }

        .form-select:focus {
            border-color: var(--brand);
            background-color: var(--bg-surface-2);
            color: var(--text-main);
            box-shadow: none;
        }

        input[type="date"] {
            color-scheme: dark;
        }

        .page-loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(10, 11, 16, 0.85);
            backdrop-filter: blur(4px);
        }

        .page-loading-overlay.is-visible {
            display: flex;
        }

        .page-loading-card {
            width: min(100%, 360px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--bg-surface);
            padding: 1.5rem;
            text-align: center;
        }

        .page-loading-spinner {
            width: 2rem;
            height: 2rem;
            margin: 0 auto 1rem;
            border-radius: 50%;
            border: 2px solid rgba(6, 182, 212, 0.1);
            border-top-color: var(--brand);
            animation: page-loading-spin 0.8s linear infinite;
        }

        .page-loading-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .page-loading-detail {
            margin-top: 0.25rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        @keyframes page-loading-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand-custom" href="/">
                Speedhive-tools
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                <ul class="navbar-nav align-items-center gap-2">
                    <li class="nav-item me-3">
                        <select class="form-select form-control-custom" style="font-size: 0.8rem; min-width: 200px; padding: 0.25rem 2rem 0.25rem 0.5rem;" onchange="navigateToOrganization(this.value)">
                            <option value="">-- Workspace --</option>
                            {% for o in org_list %}
                                <option value="{{ o.id }}" {% if o.id|string == global_org_id|string %}selected{% endif %}>{{ o.name }}</option>
                            {% endfor %}
                        </select>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom {% if request.path == '/' %}active{% endif %}" href="/{% if global_org_id %}?org_id={{ global_org_id }}{% endif %}">
                            Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-custom" href="https://speedhive.mylaps.com" target="_blank" rel="noopener">
                            MyLaps
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if notice %}
            <div class="notice-banner success"><span>{{ notice }}</span></div>
        {% endif %}
        {% if error %}
            <div class="notice-banner error"><span>{{ error }}</span></div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container d-flex justify-content-between align-items-center">
            <span>Speedhive-tools</span>
        </div>
    </footer>

    <div id="page-loading-overlay" class="page-loading-overlay" aria-hidden="true">
        <div class="page-loading-card">
            <div class="page-loading-spinner" aria-hidden="true"></div>
            <div id="page-loading-title" class="page-loading-title">Loading...</div>
            <div id="page-loading-detail" class="page-loading-detail">Working...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showPageLoading(title, detail) {
            const overlay = document.getElementById('page-loading-overlay');
            const titleNode = document.getElementById('page-loading-title');
            const detailNode = document.getElementById('page-loading-detail');
            if (!overlay || !titleNode || !detailNode) {
                return;
            }
            titleNode.textContent = title || 'Loading...';
            detailNode.textContent = detail || 'Working...';
            overlay.classList.add('is-visible');
            overlay.setAttribute('aria-hidden', 'false');
        }

        function hidePageLoading() {
            const overlay = document.getElementById('page-loading-overlay');
            if (!overlay) {
                return;
            }
            overlay.classList.remove('is-visible');
            overlay.setAttribute('aria-hidden', 'true');
        }

        function navigateToOrganization(val) {
            const path = window.location.pathname;
            showPageLoading('Loading...', 'Switching workspace');
            if (!val) {
                window.location.href = '/';
                return;
            }
            if (path === '/' || path === '/track-records' || path.includes('/stats') || path.includes('/operations')) {
                if (path.startsWith('/org/')) {
                    const parts = path.split('/');
                    parts[2] = val;
                    window.location.href = parts.join('/') + (window.location.search ? window.location.search : '');
                    return;
                }
                window.location.href = path + '?org_id=' + val;
                return;
            }
            window.location.href = '/?org_id=' + val;
        }

        document.addEventListener('submit', function (event) {
            const form = event.target;
            if (!(form instanceof HTMLFormElement)) {
                return;
            }
            if (form.dataset.loadingMessage) {
                showPageLoading(
                    form.dataset.loadingMessage,
                    form.dataset.loadingDetail || 'Working...'
                );
            }
        });

        window.addEventListener('pageshow', hidePageLoading);
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
