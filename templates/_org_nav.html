<div class="col-12 d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
    <div>
        <h1 class="h2 fw-bold mb-1">{{ org.name }}</h1>
        {% if org._display_location %}
            <span class="text-muted small">{{ org._display_location }}</span>
        {% endif %}
    </div>

    <div class="d-flex gap-2 flex-wrap">
        <a class="btn-custom {% if active_tab == 'dashboard' %}active{% else %}btn-custom-outline{% endif %} py-2 px-3" href="/?org_id={{ org.id }}">Overview</a>
        <a class="btn-custom {% if active_tab == 'track_records' %}active{% else %}btn-custom-outline{% endif %} py-2 px-3" href="/org/{{ org.id }}/track-records/curated">Track Records</a>
        <a class="btn-custom {% if active_tab == 'stats' %}active{% else %}btn-custom-outline{% endif %} py-2 px-3" href="/org/{{ org.id }}/stats">Stats</a>
        <a class="btn-custom {% if active_tab == 'data' %}active{% else %}btn-custom-outline{% endif %} py-2 px-3" href="/org/{{ org.id }}/operations">Data</a>
    </div>
</div>
