<!DOCTYPE html>
<html>
<head>
    <title>Speedhive API</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1>Speedhive API Wrapper</h1>
    <p>Use the forms below to explore race data.</p>
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-header">Event Info</div>
                <div class="card-body">
                    <form onsubmit="window.location='/event/'+document.getElementById('event_id').value; return false;">
                        <label for="event_id">Event ID:</label>
                        <input type="text" id="event_id" class="form-control" required placeholder="e.g. E123456">
                        <button type="submit" class="btn btn-primary mt-2">Go</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-header">Driver Details</div>
                <div class="card-body">
                    <form onsubmit="window.location='/driver/'+document.getElementById('driver_id').value; return false;">
                        <label for="driver_id">Driver ID:</label>
                        <input type="text" id="driver_id" class="form-control" required placeholder="e.g. D1234567">
                        <button type="submit" class="btn btn-primary mt-2">Go</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
