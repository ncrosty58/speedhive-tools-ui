<!DOCTYPE html>
<html>
<head>
    <title>Session Results</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-3">
    <a href="/" class="btn btn-secondary mb-2">&larr; Back to Home</a>
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% else %}
        <h2>Results for Session {{ session_id }}</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Driver</th>
                    <th>Car</th>
                    <th>Total Time</th>
                    <th>Best Lap</th>
                    <th>Laps</th>
                </tr>
            </thead>
            <tbody>
            {% for r in results %}
                <tr>
                    <td>{{ r.position }}</td>
                    <td>
                        <a href="{{ url_for('driver_details', driver_id=r.driver_id) }}">{{ r.driver_name }}</a>
                    </td>
                    <td>{{ r.car }}</td>
                    <td>{{ r.total_time }}</td>
                    <td>{{ r.best_lap_time }}</td>
                    <td>{{ r.laps }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    {% endif %}
</div>
</body>
</html>
